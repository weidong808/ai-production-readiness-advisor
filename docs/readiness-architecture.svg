<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900" role="img" aria-labelledby="title desc">
  <title id="title">AI Production Readiness Advisor architecture</title>
  <desc id="desc">Browser wizard posts answers; Next.js server recomputes scores and hard gates, retrieves corpus chunks, calls OpenAI for advisory narrative, and merges a ReadinessReport. The model never sets the band.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b0c0b"/>
      <stop offset="55%" stop-color="#0e1210"/>
      <stop offset="100%" stop-color="#0a0f0d"/>
    </linearGradient>
    <linearGradient id="card" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#151b18"/>
      <stop offset="100%" stop-color="#101412"/>
    </linearGradient>
    <filter id="soft" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="url(#bg)"/>

  <text x="64" y="72" fill="#f3f5f4" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="40" font-weight="700">AI Production Readiness Advisor</text>
  <text x="64" y="112" fill="#9aa7a0" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="20">One rule: scores and hard gates are deterministic - the model never sets the band</text>

  <g filter="url(#soft)">
    <rect x="56" y="160" width="420" height="420" rx="18" fill="url(#card)" stroke="#3ecf8e" stroke-width="2"/>
    <text x="84" y="208" fill="#3ecf8e" font-family="ui-monospace, Consolas, monospace" font-size="14" letter-spacing="2">BROWSER</text>
    <text x="84" y="252" fill="#f3f5f4" font-family="Georgia, serif" font-size="28">Assessment wizard</text>
    <text x="84" y="300" fill="#b8c4bc" font-family="Segoe UI, sans-serif" font-size="18">8 dimensions · A-D choices</text>
    <text x="84" y="336" fill="#b8c4bc" font-family="Segoe UI, sans-serif" font-size="18">localStorage resume</text>
    <text x="84" y="372" fill="#b8c4bc" font-family="Segoe UI, sans-serif" font-size="18">Projected band preview</text>
    <text x="84" y="408" fill="#b8c4bc" font-family="Segoe UI, sans-serif" font-size="18">MD / JSON / print export</text>
    <text x="84" y="480" fill="#6b7780" font-family="ui-monospace, Consolas, monospace" font-size="13">Client band is never trusted</text>
  </g>

  <rect x="520" y="330" width="100" height="40" rx="10" fill="#152019" stroke="#3ecf8e" stroke-width="1.5"/>
  <text x="542" y="356" fill="#a8e0c8" font-family="ui-monospace, Consolas, monospace" font-size="14">POST</text>
  <path d="M620 350 H668" stroke="#3ecf8e" stroke-width="2.5"/>
  <polygon points="668,344 684,350 668,356" fill="#3ecf8e"/>

  <g filter="url(#soft)">
    <rect x="700" y="160" width="840" height="520" rx="18" fill="url(#card)" stroke="#2a3440" stroke-width="2"/>
    <text x="736" y="208" fill="#3ecf8e" font-family="ui-monospace, Consolas, monospace" font-size="14" letter-spacing="2">NEXT.JS SERVER</text>
    <text x="736" y="258" fill="#f3f5f4" font-family="Georgia, serif" font-size="24">1. Recompute scores + hard gates</text>
    <text x="736" y="292" fill="#9aa7a0" font-family="Segoe UI, sans-serif" font-size="16">Never trust client band · HG-01 to HG-10</text>
    <text x="736" y="348" fill="#f3f5f4" font-family="Georgia, serif" font-size="24">2. Retrieve corpus chunks</text>
    <text x="736" y="382" fill="#9aa7a0" font-family="Segoe UI, sans-serif" font-size="16">Keyword RAG by weakest dimensions</text>
    <text x="736" y="438" fill="#f3f5f4" font-family="Georgia, serif" font-size="24">3. OpenAI narrative + schema repair</text>
    <text x="736" y="472" fill="#9aa7a0" font-family="Segoe UI, sans-serif" font-size="16">Zod validate · one repair retry · degrade gracefully</text>
    <text x="736" y="528" fill="#f3f5f4" font-family="Georgia, serif" font-size="24">4. Merge ReadinessReport</text>
    <text x="736" y="562" fill="#9aa7a0" font-family="Segoe UI, sans-serif" font-size="16">Best-effort rate limit · short-lived cache · no DB</text>
    <text x="736" y="630" fill="#6b7780" font-family="ui-monospace, Consolas, monospace" font-size="13">Citations = corpus IDs only</text>
  </g>

  <g filter="url(#soft)">
    <rect x="56" y="620" width="420" height="160" rx="18" fill="url(#card)" stroke="#2a3440" stroke-width="2"/>
    <text x="84" y="668" fill="#3ecf8e" font-family="ui-monospace, Consolas, monospace" font-size="14" letter-spacing="2">GIT ARTIFACTS</text>
    <text x="84" y="712" fill="#f3f5f4" font-family="Segoe UI, sans-serif" font-size="18">content/corpus/</text>
    <text x="84" y="748" fill="#f3f5f4" font-family="Segoe UI, sans-serif" font-size="18">docs/eval/fixtures/</text>
  </g>

  <text x="700" y="740" fill="#f3f5f4" font-family="Georgia, serif" font-size="22">Output: advisory ReadinessReport - not certification</text>
  <text x="64" y="860" fill="#6b7780" font-family="ui-monospace, Consolas, monospace" font-size="14">AI in Action · App #3 · Build - Validate - Improve - Document - Share</text>
</svg>
