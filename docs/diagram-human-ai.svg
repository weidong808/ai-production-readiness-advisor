<svg xmlns="http://www.w3.org/2000/svg" width="1400" height="780" viewBox="0 0 1400 780" role="img" aria-labelledby="title desc">
  <title id="title">Engineer and AI Assistant</title>
  <desc id="desc">Human owns rubric, gates, trust boundary, and advisory framing. AI accelerates scaffolding and polish. Pipeline fixtures and deploy are the truth gate.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0b0c0b"/>
      <stop offset="100%" stop-color="#0e1210"/>
    </linearGradient>
  </defs>
  <rect width="1400" height="780" fill="url(#bg)"/>
  <text x="56" y="64" fill="#f3f5f4" font-family="Segoe UI, Helvetica Neue, Arial, sans-serif" font-size="34" font-weight="700">Engineer and AI Assistant</text>
  <text x="56" y="104" fill="#9aa7a0" font-family="Segoe UI, sans-serif" font-size="18">AI changes where engineers spend time - not who owns the decisions</text>

  <rect x="56" y="160" width="400" height="420" rx="16" fill="#151b18" stroke="#3ecf8e" stroke-width="2"/>
  <text x="84" y="210" fill="#3ecf8e" font-family="ui-monospace, Consolas, monospace" font-size="14" letter-spacing="2">ENGINEER</text>
  <text x="84" y="260" fill="#f3f5f4" font-family="Segoe UI, sans-serif" font-size="18">Rubric + hard gates</text>
  <text x="84" y="300" fill="#f3f5f4" font-family="Segoe UI, sans-serif" font-size="18">Trust boundary design</text>
  <text x="84" y="340" fill="#f3f5f4" font-family="Segoe UI, sans-serif" font-size="18">Advisory product framing</text>
  <text x="84" y="380" fill="#f3f5f4" font-family="Segoe UI, sans-serif" font-size="18">Corpus curation</text>
  <text x="84" y="420" fill="#f3f5f4" font-family="Segoe UI, sans-serif" font-size="18">Fixture intent + review</text>
  <text x="84" y="460" fill="#f3f5f4" font-family="Segoe UI, sans-serif" font-size="18">Security redaction policy</text>
  <text x="84" y="530" fill="#9aa7a0" font-family="Segoe UI, sans-serif" font-size="15">Owns judgment and outcomes</text>

  <rect x="500" y="160" width="400" height="420" rx="16" fill="#151b18" stroke="#2a3440" stroke-width="2"/>
  <text x="528" y="210" fill="#9aa7a0" font-family="ui-monospace, Consolas, monospace" font-size="14" letter-spacing="2">AI ASSISTANT</text>
  <text x="528" y="260" fill="#f3f5f4" font-family="Segoe UI, sans-serif" font-size="18">Wizard scaffolding</text>
  <text x="528" y="300" fill="#f3f5f4" font-family="Segoe UI, sans-serif" font-size="18">UI / theme polish</text>
  <text x="528" y="340" fill="#f3f5f4" font-family="Segoe UI, sans-serif" font-size="18">Narrative pipeline helpers</text>
  <text x="528" y="380" fill="#f3f5f4" font-family="Segoe UI, sans-serif" font-size="18">Docs and test wiring</text>
  <text x="528" y="420" fill="#f3f5f4" font-family="Segoe UI, sans-serif" font-size="18">Refactoring inside constraints</text>
  <text x="528" y="530" fill="#9aa7a0" font-family="Segoe UI, sans-serif" font-size="15">Accelerates - never decides band</text>

  <rect x="944" y="160" width="400" height="420" rx="16" fill="#151b18" stroke="#2a3440" stroke-width="2"/>
  <text x="972" y="210" fill="#d9a13e" font-family="ui-monospace, Consolas, monospace" font-size="14" letter-spacing="2">PIPELINE</text>
  <text x="972" y="260" fill="#f3f5f4" font-family="Segoe UI, sans-serif" font-size="18">Vitest score fixtures</text>
  <text x="972" y="300" fill="#f3f5f4" font-family="Segoe UI, sans-serif" font-size="18">Hard-gate suite HG-01 to HG-10</text>
  <text x="972" y="340" fill="#f3f5f4" font-family="Segoe UI, sans-serif" font-size="18">Narrative schema fixtures</text>
  <text x="972" y="380" fill="#f3f5f4" font-family="Segoe UI, sans-serif" font-size="18">Typecheck + build</text>
  <text x="972" y="420" fill="#f3f5f4" font-family="Segoe UI, sans-serif" font-size="18">Vercel preview / production</text>
  <text x="972" y="530" fill="#9aa7a0" font-family="Segoe UI, sans-serif" font-size="15">Cursor proposes; git disposes</text>

  <text x="56" y="660" fill="#b8c4bc" font-family="Segoe UI, sans-serif" font-size="18">Methodology: Build - Validate - Improve - Document - Share</text>
  <text x="56" y="720" fill="#6b7780" font-family="ui-monospace, Consolas, monospace" font-size="13">AI in Action · App #3</text>
</svg>
